<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ニュース接触タイプ診断</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f7fb;
  color: #222;
}
.panel {
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
}
.title {
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 8px;
}
.q {
  margin: 12px 0;
}
.answers {
  margin-top: 16px;
}
.answer-btn {
  display: block;
  width: 100%;
  text-align: left;
  margin-bottom: 10px;
  padding: 12px 14px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: 0.2s;
}
.answer-btn:hover {
  background: #eef5ff;
  border-color: #4a90e2;
}
.card {
  border: 1px solid #f0c419;
  background: #fff9dc;
  padding: 16px;
  border-radius: 8px;
}
.name {
  font-size: 18px;
  font-weight: bold;
  color: #b58900;
}
.desc {
  margin-top: 6px;
}
.progress {
  margin-bottom: 10px;
  font-size: 14px;
  color: #666;
}
</style>
</head>
<body>

<div class="panel" id="intro">
  <div class="title">5つの質問に答えて、あなたのニュースとの付き合い方をチェックしよう！</div>
  <div>ニュースの取り方のタイプを、あなたの回答パターンから動物キャラクターで診断します。</div>
</div>

<div id="quiz"></div>

<div class="panel" id="resultArea" style="display:none;">
  <div class="title">診断結果</div>
  <div id="resultCard" class="card"></div>
  <div id="article" style="margin-top:12px;">
    <strong>おすすめ記事</strong>
    <div style="margin-top:6px;">
      👉 朝日新聞の若手記者が聞いた！新しいマスメディアの形は？RehacQ高橋氏の答えは

  "11221": {name: "🐈 内なる批評家・ネコ", description: "世の中の出来事を幅広く眺め、自分の中で「好きか嫌いか」を判断する自由人。気分が乗らないことには関心を示しません。"},
  "11222": {name: "🦦 世間を眺めるカピバラ", description: "流れてくる情報をぼんやりと眺め、世の中の雰囲気を感じ取る平和主義者。のんびり情報浴を楽しんでいます。"},

  "12212": {name: "🦜 ゴシップ好きのインコ", description: "特定のコミュニティの噂話や最新ニュースが大好き！見つけた情報をすぐに仲間に広めて楽しむ、おしゃべり上手な人気者。"},

  "21222": {name: "🦥 のんびり屋のナマケモノ", description: "ただただ流れてくる情報を眺めているだけで満足。自分で動くのは少し面倒だけど、世の中のことはなんとなく知っています。"},
  "22111": {name: "🦘 専門分野の解説者・カンガルー", description: "人から聞いた特定分野の情報を、自分なりに分析して分かりやすく発信。面倒見がよく、後輩から頼りにされる存在です。"},
  "22112": {name: "🐇 オタ友と語り合うウサギ", description: "信頼する仲間から得た推しの情報を、さらに分析して語り合うのが大好き。寂しがり屋だけど、好きなことへの熱量は本物です。"},
  "22121": {name: "🕷️ 物静かな職人・クモ", description: "限られた情報から、静かに思考を張り巡らせ、自分だけの完璧な知識の巣を作り上げる職人肌。邪魔されるのを嫌います。"},
  "22122": {name: "🐚 秘めたるオタク・貝", description: "自分の殻の中に、好きなものに関する膨大な知識を秘めているタイプ。普段は物静かですが、一度口を開くと止まりません。"},
  "22211": {name: "🕊️ 愛を叫ぶ伝書鳩", description: "仲間から聞いた推しの尊さを、感情のままに世界へ発信する愛の伝道師。「好き」を共有できることに喜びを感じます。"},
  "22212": {name: "🦝 井戸端会議のリーダー・アライグマ", description: "仲間内で共有された情報を元に、ワイワイおしゃべりするのが大好き。コミュニティを盛り上げる中心人物です。"},
  "22221": {name: "🦦 マイペースな夢見るラッコ", description: "好きな情報だけを、好きなときに、好きなだけ楽しむ自由人。自分の心地よい世界で、幸せに暮らしています。"},
  "22222": {name: "シーラカンス", description: "ごく限られた情報源からしか情報を受け取らず、自分の世界に深く閉じこもる孤高の存在。外界の喧騒には興味がありません。"},

const defaultType = {
  name: "❓ ミステリアスな存在",
  description: "あなたは規格外のユニークな存在です！"
};

let currentQuestionIndex = 0;
let selectedAnswers = [];

function renderCurrentQuestion() {
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  if (currentQuestionIndex >= QUESTIONS.length) {
    showResult();
    return;
  }

  const q = QUESTIONS[currentQuestionIndex];

  const panel = document.createElement("div");
  panel.className = "panel q";

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.textContent = `${currentQuestionIndex + 1} / ${QUESTIONS.length}`;

  const title = document.createElement("div");
  title.className = "title";
  title.textContent = q.text;

  const answers = document.createElement("div");
  answers.className = "answers";

  q.answers.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = `${i + 1}. ${ans}`;
    btn.addEventListener("click", () => {
      selectedAnswers.push(String(i + 1));
      currentQuestionIndex++;
      renderCurrentQuestion();
    });
    answers.appendChild(btn);
  });

  panel.appendChild(progress);
  panel.appendChild(title);
  panel.appendChild(answers);
  quizDiv.appendChild(panel);
}

function showResult() {
  const key = selectedAnswers.join("");
  const finalType = ANIMAL_TYPES[key] || defaultType;

  document.getElementById("quiz").innerHTML = "";
  const resDiv = document.getElementById("resultCard");
  resDiv.innerHTML = `
    <div class="name">${finalType.name}</div>
    <div class="desc">${finalType.description}</div>
  `;

  document.getElementById("resultArea").style.display = "block";
  document.getElementById("resultArea").scrollIntoView({ behavior: "smooth" });
}

renderCurrentQuestion();
</script>
</body>
</html>
